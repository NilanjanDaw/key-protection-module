name: release

on:
  push:
    branches:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      refToBuild:
        description: 'Branch, tag or commit SHA1 to build'
        required: false
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      matrix:
        go-version: [1.24.x]
        os: [ubuntu-latest]

    name: Release (${{ matrix.os}}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.refToBuild }}
          submodules: recursive
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
      
      - shell: bash
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      
      - name: Install Linux packages
        run: sudo apt-get update && sudo apt-get -y install libssl-dev cmake clang pkg-config
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install bindgen-cli
        run: cargo install bindgen-cli
      
      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate FFI Headers
        run: ./generate_ffi_headers.sh

      - name: Build Rust components
        run: cargo build --release

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        if: success() && (startsWith(github.ref, 'refs/tags/') || startsWith(inputs.refToBuild, 'refs/tags/'))
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
